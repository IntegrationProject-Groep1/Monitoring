name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"] # Must match the 'name' of your CI workflow exactly
    types:
      - completed

jobs:
  build-and-push:
    name: Build and Push Docker Image
    # Only deploy if the CI Pipeline was successful AND the trigger was a version tag (starts with 'v')
    # This prevents development branches from being pushed to the production registry.
    if: >
      github.event.workflow_run.conclusion == 'success' && 
      (github.event.workflow_run.head_branch == null || 
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the specific commit SHA that passed the CI tests
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Lowercase repo name
        id: repo_name
        # Docker image names must be lowercase. This step converts 'User/Repo' to 'user/repo'.
        run: echo "value=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push detector image
        uses: docker/build-push-action@v5
        with:
          context: ./detector
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.value }}/detector:latest
            ghcr.io/${{ steps.repo_name.outputs.value }}/detector:${{ github.event.workflow_run.head_branch }}
            ghcr.io/${{ steps.repo_name.outputs.value }}/detector:${{ github.event.workflow_run.head_sha }}
