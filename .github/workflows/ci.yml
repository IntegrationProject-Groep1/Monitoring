name: CI Pipeline

on:
  push:
    branches: [ "main", "dev", "prod" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "dev", "prod" ]

jobs:

  validate:
    name: Validate configs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write test .env
        env:
          ENV_CONTENT: |
            ES_ADMIN_USER=elastic
            ES_ADMIN_PASS=elk123
            ES_MEM_LIMIT=512m
            KIBANA_SYSTEM_PASS=kibana123
            RABBITMQ_HOST=rabbitmq-test
            RABBITMQ_PORT=5672
            RABBITMQMONITORING_USER=monitoring_test
            RABBITMQMONITORING_PASS=monitoring_test_pass
            RABBITMQ_VHOST=/
        run: echo "$ENV_CONTENT" > monitoring_elk/.env

      - name: Validate docker-compose syntax
        run: |
          docker compose --env-file monitoring_elk/.env \
            -f docker-compose.yml -f test/docker-compose.yml \
            config --quiet

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax-check detector
        run: python -m py_compile detector/detector.py

  integration-test:
    name: Integration test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write test .env
        env:
          ENV_CONTENT: |
            ES_ADMIN_USER=elastic
            ES_ADMIN_PASS=elk123
            ES_MEM_LIMIT=512m
            KIBANA_SYSTEM_PASS=kibana123
            RABBITMQ_HOST=rabbitmq-test
            RABBITMQ_PORT=5672
            RABBITMQMONITORING_USER=monitoring_test
            RABBITMQMONITORING_PASS=monitoring_test_pass
            RABBITMQ_VHOST=/
        run: echo "$ENV_CONTENT" > monitoring_elk/.env

      - name: Start stack (RabbitMQ + ELK + detector)
        run: |
          docker compose --env-file monitoring_elk/.env \
            -f docker-compose.yml -f test/docker-compose.yml \
            up -d --wait --wait-timeout 90 \
            rabbitmq elasticsearch logstash detector-service

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r test/requirements.txt

      - name: Send test heartbeats
        run: python test/producer.py
        env:
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQMONITORING_USER: monitoring_test
          RABBITMQMONITORING_PASS: monitoring_test_pass

      - name: Verify documents indexed in Elasticsearch
        run: python test/verify.py
        env:
          ES_HOST: http://localhost:30060
          ES_ADMIN_USER: elastic
          ES_ADMIN_PASS: elk123

      - name: Verify detector emits alert
        run: python test/verify_detector.py
        env:
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          RABBITMQMONITORING_USER: monitoring_test
          RABBITMQMONITORING_PASS: monitoring_test_pass

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose --env-file monitoring_elk/.env \
            -f docker-compose.yml -f test/docker-compose.yml \
            logs --no-color

      - name: Tear down
        if: always()
        run: |
          docker compose --env-file monitoring_elk/.env \
            -f docker-compose.yml -f test/docker-compose.yml down -v
