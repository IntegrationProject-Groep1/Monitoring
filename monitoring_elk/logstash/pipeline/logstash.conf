input {
  rabbitmq {
    host => "${RABBITMQ_HOST}"
    port => "${RABBITMQ_PORT}"
    user => "${RABBITMQMONITORING_USER}"
    password => "${RABBITMQMONITORING_PASS}"
    vhost => "${RABBITMQ_VHOST}"
    queue => "heartbeat"
    durable => true
    tags => ["heartbeat_data"]
  }

  rabbitmq {
    host => "${RABBITMQ_HOST}"
    port => "${RABBITMQ_PORT}"
    user => "${RABBITMQMONITORING_USER}"
    password => "${RABBITMQMONITORING_PASS}"
    vhost => "${RABBITMQ_VHOST}"
    queue => "logs"
    durable => true
    tags => ["platform_logs"]
  }
} 

filter {
  xml {
    source => "message"
    target => "parsed"
    force_array => false
  }

  if "_xmlparsefailure" in [tags] {
    mutate {
     add_tag => ["quarantine"] }
  } else {
    
    if "heartbeat_data" in [tags] {
      mutate {
        add_field => {
          "system" => "%{[parsed][system]}"
          "uptime_seconds" => "%{[parsed][uptime]}"
          "temp_ts" => "%{[parsed][timestamp]}"
        }
      }
    }

    if "platform_logs" in [tags] {
      mutate {
        add_field => {
          "system" => "%{[parsed][system]}"
          "level"  => "%{[parsed][level]}"
          "action" => "%{[parsed][action]}"
          "log_msg" => "%{[parsed][message]}"
          "temp_ts" => "%{[parsed][timestamp]}"
        }
      }
      lowercase => ["level", "action"]
    }

    lowercase => ["system"]
    
    date {
      match => [ "temp_ts", "ISO8601" ]
      target => "@timestamp"
    }

    # Known systems: planning, crm, kassa, facturatie, monitoring, frontend, mailing
    # Anything else goes to quarantine.
    if [system] not in ["planning", "crm", "kassa", "facturatie", "monitoring", "frontend", "mailing"] {
      mutate {
        add_field => { "parse_error" => "unknown_system" }
        add_tag => ["quarantine", "unknown_system"]
      }
    }

    # Keep only the 4 useful fields on clean documents.
    # Quarantine documents keep message and heartbeat_timestamp for debugging.
    if "quarantine" not in [tags] {
      mutate {
        remove_field => ["message", "temp_ts", "@version"]
      }
    }
  }

  mutate { remove_field => ["parsed"] }
}

output {
  if "quarantine" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS}"]
      user => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index => "quarantine-%{+YYYY.MM.dd}"
    }
  } else if "heartbeat_data" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS}"]
      user => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index => "heartbeats-%{+YYYY.MM.dd}"
    }
  } else if "platform_logs" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS}"]
      user => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index => "platform-logs-%{+YYYY.MM.dd}"
    }
  }

  stdout { codec => json_lines }
}