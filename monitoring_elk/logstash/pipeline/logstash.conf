input {
  rabbitmq {
    host => "${RABBITMQ_HOST}"
    port => "${RABBITMQ_PORT}"
    user => "${RABBITMQMONITORING_USER}"
    password => "${RABBITMQMONITORING_PASS}"
    vhost => "${RABBITMQ_VHOST}"
    queue => "heartbeat"
    durable => true
    codec => "plain"
    tags => ["heartbeats"]
  }

  rabbitmq {
    host => "${RABBITMQ_HOST}"
    port => "${RABBITMQ_PORT}"
    user => "${RABBITMQMONITORING_USER}"
    password => "${RABBITMQMONITORING_PASS}"
    vhost => "${RABBITMQ_VHOST}"
    queue => "logs"
    durable => true
    codec => "plain"
    tags => ["logs"]
  }

  rabbitmq {
    host          => "${RABBITMQ_HOST}"
    port          => "${RABBITMQ_PORT}"
    user          => "${RABBITMQMONITORING_USER}"
    password      => "${RABBITMQMONITORING_PASS}"
    vhost         => "${RABBITMQ_VHOST}"
    queue         => "monitoring.user.events"
    exchange      => "user.events"
    exchange_type => "fanout"
    durable       => true
    codec         => "plain"
    tags          => ["user_events"]
  }

  rabbitmq {
    host          => "${RABBITMQ_HOST}"
    port          => "${RABBITMQ_PORT}"
    user          => "${RABBITMQMONITORING_USER}"
    password      => "${RABBITMQMONITORING_PASS}"
    vhost         => "${RABBITMQ_VHOST}"
    queue         => "stats.sessions"
    exchange      => "planning.exchange"
    exchange_type => "topic"
    key           => "planning.session.*"
    durable       => true
    codec         => "plain"
    tags          => ["stats_sessions"]
  }

  rabbitmq {
    host          => "${RABBITMQ_HOST}"
    port          => "${RABBITMQ_PORT}"
    user          => "${RABBITMQMONITORING_USER}"
    password      => "${RABBITMQMONITORING_PASS}"
    vhost         => "${RABBITMQ_VHOST}"
    queue         => "stats.consumptions"
    exchange      => "kassa.exchange"
    exchange_type => "topic"
    key           => "kassa.payments.consumption"
    durable       => true
    codec         => "plain"
    tags          => ["stats_consumptions"]
  }

  rabbitmq {
    host          => "${RABBITMQ_HOST}"
    port          => "${RABBITMQ_PORT}"
    user          => "${RABBITMQMONITORING_USER}"
    password      => "${RABBITMQMONITORING_PASS}"
    vhost         => "${RABBITMQ_VHOST}"
    queue         => "stats.payments"
    exchange      => "kassa.exchange"
    exchange_type => "topic"
    key           => "kassa.payments.#"
    durable       => true
    codec         => "plain"
    tags          => ["stats_payments"]
  }

  rabbitmq {
    host          => "${RABBITMQ_HOST}"
    port          => "${RABBITMQ_PORT}"
    user          => "${RABBITMQMONITORING_USER}"
    password      => "${RABBITMQMONITORING_PASS}"
    vhost         => "${RABBITMQ_VHOST}"
    queue         => "stats.refunds"
    exchange      => "kassa.exchange"
    exchange_type => "topic"
    key           => "kassa.payments.refund"
    durable       => true
    codec         => "plain"
    tags          => ["stats_refunds"]
  }
}

filter {
  # ----- Phase 1: annotate ingest time -----
  mutate {
    add_field => { "received_at" => "%{@timestamp}" }
  }

  # ----- Phase 2: parse XML and route by pipeline -----
  xml {
    source      => "message"
    target      => "parsed"
    force_array => false
  }

  if "_xmlparsefailure" in [tags] {
    mutate {
      add_field => { "parse_error" => "xml_parse_failure" }
      add_tag   => ["quarantine"]
    }

  } else if "user_events" in [tags] {
    # Identity Service uses a flat <user_event> envelope — no standard v2.0 header.
    mutate {
      add_field => {
        "event_type"      => "%{[parsed][event]}"
        "master_uuid"     => "%{[parsed][master_uuid]}"
        "email"           => "%{[parsed][email]}"
        "source_system"   => "%{[parsed][source_system]}"
        "event_timestamp" => "%{[parsed][timestamp]}"
      }
    }

    if [event_type] != "UserCreated" {
      mutate {
        add_field => { "parse_error" => "unknown_event_type" }
        add_tag   => ["quarantine", "unknown_event_type"]
      }
    }

    date {
      match          => [ "event_timestamp", "ISO8601" ]
      target         => "@timestamp"
      tag_on_failure => ["bad_event_timestamp"]
    }

    if "bad_event_timestamp" in [tags] {
      mutate {
        add_tag   => ["quarantine"]
        add_field => { "parse_error" => "bad_event_timestamp" }
      }
    }

    if "quarantine" not in [tags] {
      mutate {
        remove_field => ["event_timestamp", "message", "@version"]
      }
    }

  } else if "stats_sessions" in [tags] or "stats_consumptions" in [tags] or "stats_payments" in [tags] or "stats_refunds" in [tags] {
    # Stats pipelines: standard v2.0 <message><header> envelope.

    if [parsed][header][version] != "2.0" {
      mutate {
        add_field => { "parse_error" => "unsupported_contract_version" }
        add_tag   => ["quarantine", "unsupported_contract_version"]
      }
    } else {
      # Common header fields kept on every stats document.
      mutate {
        add_field => {
          "message_id"      => "%{[parsed][header][message_id]}"
          "event_type"      => "%{[parsed][header][type]}"
          "event_timestamp" => "%{[parsed][header][timestamp]}"
        }
      }

      # ----- Sessions -----
      if "stats_sessions" in [tags] {
        if [event_type] == "session_created" or [event_type] == "session_updated" {
          mutate {
            add_field => {
              "session_id"           => "%{[parsed][body][session_id]}"
              "session_type"         => "%{[parsed][body][session_type]}"
              "status"               => "%{[parsed][body][status]}"
              "speaker_organisation" => "%{[parsed][body][speaker][organisation]}"
            }
          }
          if [event_type] == "session_updated" {
            if [parsed][body][change_reason] {
              mutate {
                add_field => { "change_reason" => "%{[parsed][body][change_reason]}" }
              }
            }
          }
        } else if [event_type] == "session_deleted" {
          mutate {
            add_field => {
              "session_id" => "%{[parsed][body][session_id]}"
              "reason"     => "%{[parsed][body][reason]}"
            }
          }
        } else {
          mutate {
            add_field => { "parse_error" => "unknown_event_type" }
            add_tag   => ["quarantine", "unknown_event_type"]
          }
        }
      }

      # ----- Consumptions -----
      if "stats_consumptions" in [tags] {
        if [event_type] == "consumption_order" {
          mutate {
            add_field => {
              "is_anonymous"  => "%{[parsed][body][is_anonymous]}"
              "customer_type" => "%{[parsed][body][customer][type]}"
            }
            copy => { "[parsed][body][items]" => "items" }
          }
          mutate {
            convert => { "is_anonymous" => "boolean" }
          }
        } else {
          mutate {
            add_field => { "parse_error" => "unknown_event_type" }
            add_tag   => ["quarantine", "unknown_event_type"]
          }
        }
      }

      # ----- Payments -----
      if "stats_payments" in [tags] {
        if [event_type] == "payment_registered" {
          mutate {
            add_field => {
              "payment_context" => "%{[parsed][body][payment_context]}"
              "correlation_id"  => "%{[parsed][header][correlation_id]}"
              "invoice_id"      => "%{[parsed][body][invoice][id]}"
              "invoice_status"  => "%{[parsed][body][invoice][status]}"
              "payment_method"  => "%{[parsed][body][transaction][payment_method]}"
            }
          }
        } else {
          mutate {
            add_field => { "parse_error" => "unknown_event_type" }
            add_tag   => ["quarantine", "unknown_event_type"]
          }
        }
      }

      # ----- Refunds -----
      if "stats_refunds" in [tags] {
        if [event_type] == "refund_processed" {
          mutate {
            add_field => {
              "correlation_id" => "%{[parsed][header][correlation_id]}"
              "refund_method"  => "%{[parsed][body][refund][method]}"
            }
          }
        } else {
          mutate {
            add_field => { "parse_error" => "unknown_event_type" }
            add_tag   => ["quarantine", "unknown_event_type"]
          }
        }
      }

      date {
        match          => [ "event_timestamp", "ISO8601" ]
        target         => "@timestamp"
        tag_on_failure => ["bad_event_timestamp"]
      }

      if "bad_event_timestamp" in [tags] {
        mutate {
          add_tag   => ["quarantine"]
          add_field => { "parse_error" => "bad_event_timestamp" }
        }
      }

      if "quarantine" not in [tags] {
        mutate {
          remove_field => ["event_timestamp", "message", "@version"]
        }
      }
    }

  } else {
    # heartbeats and logs: standard v2.0 <message><header> envelope

    # Contract version gate: anything other than "2.0" goes to quarantine.
    if [parsed][header][version] != "2.0" {
      mutate {
        add_field => { "parse_error" => "unsupported_contract_version" }
        add_tag   => ["quarantine", "unsupported_contract_version"]
      }
    }

    if "heartbeats" in [tags] {
      mutate {
        add_field => {
          "system"          => "%{[parsed][header][source]}"
          "status"          => "%{[parsed][body][status]}"
          "event_timestamp" => "%{[parsed][header][timestamp]}"
        }
      }

      if [status] not in ["online", "offline"] {
        mutate {
          add_field => { "parse_error" => "unknown_status" }
          add_tag   => ["quarantine", "unknown_status"]
        }
      }

      if ![parsed][body][uptime] {
        mutate {
          add_field => { "parse_error" => "missing_uptime" }
          add_tag   => ["quarantine", "missing_uptime"]
        }
      } else {
        mutate {
          add_field => { "uptime_seconds" => "%{[parsed][body][uptime]}" }
          convert   => { "uptime_seconds" => "integer" }
        }
      }
    }

    if "logs" in [tags] {
      mutate {
        add_field => {
          "system"          => "%{[parsed][header][source]}"
          "event_timestamp" => "%{[parsed][header][timestamp]}"
          "level"           => "%{[parsed][body][level]}"
          "action"          => "%{[parsed][body][action]}"
          "log_message"     => "%{[parsed][body][message]}"
        }
      }
      mutate { lowercase => ["level", "action"] }

      if [parsed][header][type] != "log" {
        mutate {
          add_field => { "parse_error" => "wrong_message_type" }
          add_tag   => ["quarantine", "wrong_message_type"]
        }
      }

      if [level] not in ["info", "warning", "error"] {
        mutate {
          add_field => { "parse_error" => "unknown_level" }
          add_tag   => ["quarantine", "unknown_level"]
        }
      }

      if [action] not in ["registration","user","payment","invoice","session","calendar","email","wallet","refund","identity","xml_validation","system_error","badge"] {
        mutate { add_tag => ["unknown_action"] }
      }
    }

    # ----- Phase 3: normalize + validate `system` (per contract, pipeline-specifiek) -----
    mutate {
      lowercase => ["system"]
      strip     => ["system"]
    }

    # Heartbeat sources (contract Sectie 3): geen identity-service (Identity heeft geen sidecar).
    if "heartbeats" in [tags] {
      if [system] not in ["planning", "crm", "kassa", "facturatie", "monitoring", "frontend", "mailing", "iot_gateway"] {
        mutate {
          add_field => { "parse_error" => "unknown_system" }
          add_tag   => ["quarantine", "unknown_system"]
        }
      }
    } else if "logs" in [tags] {
      # Log sources (contract Sectie 3.5): geen monitoring (logt niet aan zichzelf), wel identity-service en iot_gateway.
      if [system] not in ["crm", "kassa", "facturatie", "frontend", "planning", "mailing", "identity-service", "iot_gateway"] {
        mutate {
          add_field => { "parse_error" => "unknown_system" }
          add_tag   => ["quarantine", "unknown_system"]
        }
      }
    }

    # ----- Phase 4: derive @timestamp -----
    date {
      match          => [ "event_timestamp", "ISO8601" ]
      target         => "@timestamp"
      tag_on_failure => ["bad_event_timestamp"]
    }

    if "bad_event_timestamp" in [tags] {
      mutate {
        add_tag   => ["quarantine"]
        add_field => { "parse_error" => "bad_event_timestamp" }
      }
    }

    # ----- Phase 5: cleanup on clean docs (quarantine keeps raw payload for debug) -----
    if "quarantine" not in [tags] {
      mutate {
        remove_field => ["event_timestamp", "message", "@version"]
      }
    }
  }

  mutate { remove_field => ["parsed"] }
}

output {
  if "quarantine" in [tags] {
    # Failures: log to docker stdout AND ship to per-pipeline quarantine index.
    stdout { codec => json_lines }

    if "heartbeats" in [tags] {
      elasticsearch {
        hosts    => ["${ELASTICSEARCH_HOSTS}"]
        user     => "${ES_ADMIN_USER}"
        password => "${ES_ADMIN_PASS}"
        index    => "heartbeats-quarantine-%{+YYYY.MM.dd}"
        action   => "create"
      }
    } else if "logs" in [tags] {
      elasticsearch {
        hosts    => ["${ELASTICSEARCH_HOSTS}"]
        user     => "${ES_ADMIN_USER}"
        password => "${ES_ADMIN_PASS}"
        index    => "logs-quarantine-%{+YYYY.MM.dd}"
        action   => "create"
      }
    } else if "user_events" in [tags] {
      elasticsearch {
        hosts    => ["${ELASTICSEARCH_HOSTS}"]
        user     => "${ES_ADMIN_USER}"
        password => "${ES_ADMIN_PASS}"
        index    => "user-events-quarantine-%{+YYYY.MM.dd}"
        action   => "create"
      }
    } else if "stats_sessions" in [tags] or "stats_consumptions" in [tags] or "stats_payments" in [tags] or "stats_refunds" in [tags] {
      elasticsearch {
        hosts    => ["${ELASTICSEARCH_HOSTS}"]
        user     => "${ES_ADMIN_USER}"
        password => "${ES_ADMIN_PASS}"
        index    => "stats-quarantaine-%{+YYYY.MM.dd}"
        action   => "create"
      }
    }

  } else if "heartbeats" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOSTS}"]
      user     => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index    => "heartbeats-%{+YYYY.MM.dd}"
      action   => "create"
    }

  } else if "logs" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOSTS}"]
      user     => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index    => "logs-%{+YYYY.MM.dd}"
      action   => "create"
    }

  } else if "user_events" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOSTS}"]
      user     => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index    => "user-events-%{+YYYY.MM.dd}"
      action   => "create"
    }

  } else if "stats_sessions" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOSTS}"]
      user     => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index    => "stats-sessies-%{+YYYY.MM.dd}"
      action   => "create"
    }

  } else if "stats_consumptions" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOSTS}"]
      user     => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index    => "stats-consumpties-%{+YYYY.MM.dd}"
      action   => "create"
    }

  } else if "stats_payments" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOSTS}"]
      user     => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index    => "stats-betalingen-%{+YYYY.MM.dd}"
      action   => "create"
    }

  } else if "stats_refunds" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOSTS}"]
      user     => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index    => "stats-refunds-%{+YYYY.MM.dd}"
      action   => "create"
    }
  }
}