input {
  rabbitmq {
    host => "${RABBITMQ_HOST}"
    port => "${RABBITMQ_PORT}"
    user => "${RABBITMQMONITORING_USER}"
    password => "${RABBITMQMONITORING_PASS}"
    vhost => "${RABBITMQ_VHOST}"
    queue => "heartbeat"
    durable => true
    codec => "plain"
    tags => ["heartbeat_data"]
  }

  rabbitmq {
    host => "${RABBITMQ_HOST}"
    port => "${RABBITMQ_PORT}"
    user => "${RABBITMQMONITORING_USER}"
    password => "${RABBITMQMONITORING_PASS}"
    vhost => "${RABBITMQ_VHOST}"
    queue => "logs"
    durable => true
    codec => "plain"
    tags => ["platform_logs"]
  }
}

filter {
  # ----- Phase 1: annotate ingest time -----
  mutate {
    add_field => { "received_at" => "%{@timestamp}" }
  }

  # ----- Phase 2: parse XML and extract fields by pipeline -----
  xml {
    source      => "message"
    target      => "parsed"
    force_array => false
  }

  if "_xmlparsefailure" in [tags] {
    mutate {
      add_field => { "parse_error" => "xml_parse_failure" }
      add_tag   => ["quarantine"]
    }
  } else {

    if "heartbeat_data" in [tags] {
      mutate {
        add_field => {
          "system"          => "%{[parsed][system]}"
          "uptime_seconds"  => "%{[parsed][uptime]}"
          "event_timestamp" => "%{[parsed][timestamp]}"
        }
      }
      mutate { convert => { "uptime_seconds" => "integer" } }
    }

    if "platform_logs" in [tags] {
      mutate {
        add_field => {
          "system"          => "%{[parsed][system]}"
          "level"           => "%{[parsed][level]}"
          "action"          => "%{[parsed][action]}"
          "log_message"     => "%{[parsed][message]}"
          "event_timestamp" => "%{[parsed][timestamp]}"
        }
      }
      mutate { lowercase => ["level", "action"] }

      if [level] not in ["info", "warning", "error"] {
        mutate {
          add_field => { "parse_error" => "unknown_level" }
          add_tag   => ["quarantine", "unknown_level"]
        }
      }
    }

    # ----- Phase 3: normalize + validate `system` (shared) -----
    mutate {
      lowercase => ["system"]
      strip     => ["system"]
    }

    # Known systems: planning, crm, kassa, facturatie, monitoring, frontend, mailing.
    # Anything else goes to quarantine.
    if [system] not in ["planning", "crm", "kassa", "facturatie", "monitoring", "frontend", "mailing"] {
      mutate {
        add_field => { "parse_error" => "unknown_system" }
        add_tag   => ["quarantine", "unknown_system"]
      }
    }

    # ----- Phase 4: derive @timestamp (shared) -----
    date {
      match          => [ "event_timestamp", "ISO8601" ]
      target         => "@timestamp"
      tag_on_failure => ["bad_event_timestamp"]
    }

    if "bad_event_timestamp" in [tags] {
      mutate {
        add_tag   => ["quarantine"]
        add_field => { "parse_error" => "bad_event_timestamp" }
      }
    }

    # ----- Phase 5: cleanup on clean docs (quarantine keeps raw payload for debug) -----
    if "quarantine" not in [tags] {
      mutate {
        remove_field => ["event_timestamp", "message", "@version"]
      }
    }
  }

  mutate { remove_field => ["parsed"] }
}

output {
  if "quarantine" in [tags] {
    # Failures: log to docker stdout AND ship to per-pipeline quarantine index.
    stdout { codec => json_lines }

    if "heartbeat_data" in [tags] {
      elasticsearch {
        hosts    => ["${ELASTICSEARCH_HOSTS}"]
        user     => "${ES_ADMIN_USER}"
        password => "${ES_ADMIN_PASS}"
        index    => "heartbeats-quarantine-%{+YYYY.MM.dd}"
      }
    } else if "platform_logs" in [tags] {
      elasticsearch {
        hosts    => ["${ELASTICSEARCH_HOSTS}"]
        user     => "${ES_ADMIN_USER}"
        password => "${ES_ADMIN_PASS}"
        index    => "logs-quarantine-%{+YYYY.MM.dd}"
      }
    }

  } else if "heartbeat_data" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOSTS}"]
      user     => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index    => "heartbeats-%{+YYYY.MM.dd}"
    }

  } else if "platform_logs" in [tags] {
    elasticsearch {
      hosts    => ["${ELASTICSEARCH_HOSTS}"]
      user     => "${ES_ADMIN_USER}"
      password => "${ES_ADMIN_PASS}"
      index    => "logs-%{+YYYY.MM.dd}"
    }
  }
}
