services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-test
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQMONITORING_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQMONITORING_PASS}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - elk-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  detector-service:
    depends_on:
      rabbitmq:
        condition: service_healthy

networks:
  elk-net:
    name: elk-net
