services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: elasticsearch-test
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_ADMIN_PASS}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "127.0.0.1:30060:9200"
    volumes:
      - es-data-test:/usr/share/elasticsearch/data
    networks:
      - elk-net
    healthcheck:
      test: >
        curl -s -o /dev/null -w "%{http_code}"
        -u "${ES_ADMIN_USER}:${ES_ADMIN_PASS}"
        http://localhost:9200/_cluster/health
        | grep -qE "^(200)$"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.17.0
    container_name: logstash-test
    restart: unless-stopped
    environment:
      - xpack.monitoring.enabled=false
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ES_ADMIN_USER=${ES_ADMIN_USER}
      - ES_ADMIN_PASS=${ES_ADMIN_PASS}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQMONITORING_USER=${RABBITMQMONITORING_USER}
      - RABBITMQMONITORING_PASS=${RABBITMQMONITORING_PASS}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST}
    volumes:
      - ../monitoring_elk/logstash/pipeline:/usr/share/logstash/pipeline
    networks:
      - elk-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-test
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQMONITORING_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQMONITORING_PASS}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - elk-net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  detector-service:
    image: monitoring/detector:latest
    container_name: detector-service-test
    environment:
      - ES_HOST=http://elasticsearch:9200
      - ES_ADMIN_USER=${ES_ADMIN_USER}
      - ES_ADMIN_PASS=${ES_ADMIN_PASS}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQMONITORING_USER=${RABBITMQMONITORING_USER}
      - RABBITMQMONITORING_PASS=${RABBITMQMONITORING_PASS}
      - RABBITMQ_VHOST=${RABBITMQ_VHOST}
      - REPORT_QUEUE=monitoring.reports
      - REPORT_RECIPIENTS=admin1@example.com:admin-001:Platform:Admin,client@example.com:client-001:Event:Client
      - REPORT_TEMPLATE_ID=tmpl-monitoring-daily-report
      - REPORT_CAMPAIGN_PREFIX=monitoring-daily
      - REPORT_SOURCE=monitoring
      - REPORT_MAIL_TYPE=daily_report
      - REPORT_TIME_HOUR=6
      - REPORT_TIME_MINUTE=0
    depends_on:
      elasticsearch:
        condition: service_healthy
      logstash:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - elk-net

volumes:
  es-data-test:

networks:
  elk-net:
    name: elk-net
